<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimlocker Autofill</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;
  color:#c8d6e5;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:13px;
  overflow:hidden;
  user-select:none;
}
#app{display:flex;flex-direction:column;height:100vh}
#loading{
  display:flex;align-items:center;justify-content:center;
  height:64px;color:#8395a7;font-size:12px;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.search-wrap{
  padding:8px 10px 4px;
  border-bottom:1px solid #1e272e;
  flex-shrink:0;
}
.search-input{
  width:100%;
  background:#111318;
  border:1px solid #2d3436;
  border-radius:6px;
  color:#dfe6e9;
  font-size:12px;
  padding:5px 10px;
  outline:none;
  transition:border-color .15s;
}
.search-input:focus{border-color:#0abde3}
.search-input::placeholder{color:#57606f}

.header{
  padding:6px 12px 2px;
  font-size:10px;text-transform:uppercase;letter-spacing:1px;
  color:#57606f;
  flex-shrink:0;
}
.list-wrap{flex:1;overflow-y:auto;min-height:0}
.list-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px;cursor:pointer;
  transition:background .1s;
}
.list-item:hover,.list-item.active{background:#1e272e}
.list-item .icon{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:#2d3436;color:#0abde3;
  font-size:14px;font-weight:700;flex-shrink:0;
}
.list-item.active .icon{background:#0abde3;color:#0a0a0f}
.list-item .info{flex:1;min-width:0}
.list-item .title{font-size:12px;font-weight:600;color:#dfe6e9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .sub{font-size:10px;color:#636e72;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .enter-hint{
  font-size:10px;color:#0abde3;margin-left:auto;flex-shrink:0;
  opacity:0;transition:opacity .1s;
}
.list-item.active .enter-hint{opacity:1}
.footer{
  padding:4px 12px 5px;border-top:1px solid #1e272e;
  display:flex;justify-content:space-between;flex-shrink:0;
  font-size:9px;color:#57606f;
}
.footer span{display:flex;align-items:center;gap:4px}
kbd{
  background:#2d3436;border:1px solid #636e72;border-radius:3px;
  padding:1px 4px;font-size:9px;font-family:inherit;color:#b2bec3;
}
.no-results{
  padding:20px;text-align:center;color:#636e72;font-size:12px;
}
</style>
</head>
<body>
<div id="app">
  <div id="loading">Suche Passwörter…</div>
</div>

<script>
(function() {
  'use strict'

  // ── Tauri v2 IPC ─────────────────────────────────────────────────
  // In Tauri v2 haben Plain-HTML-Fenster kein window.__TAURI__ (das kommt
  // nur durch den Vite-Bundle). Was immer verfügbar ist: __TAURI_INTERNALS__
  // mit postMessage für raw IPC-Aufrufe.

  function tauriPostMessage(cmd, payload) {
    return new Promise((resolve, reject) => {
      const internals = window.__TAURI_INTERNALS__
      if (!internals) {
        reject(new Error('Tauri internals nicht verfügbar'))
        return
      }
      const cb  = internals.transformCallback(resolve, true)
      const err = internals.transformCallback(reject,  true)
      internals.postMessage({ cmd, callback: cb, error: err, payload })
    })
  }

  function tauriEmit(event, payload) {
    return tauriPostMessage('plugin:event|emit', { event, payload })
  }

  function tauriListen(event, handler) {
    const internals = window.__TAURI_INTERNALS__
    if (!internals) return

    // Handler über transformCallback registrieren
    const cb = internals.transformCallback((e) => handler(e))

    tauriPostMessage('plugin:event|listen', {
      event,
      target: { kind: 'Any' },
      handler: cb,
    }).catch(e => console.error('[Autofill] listen failed:', e))
  }

  // ── State ─────────────────────────────────────────────────────────
  const app = document.getElementById('app')
  let allEntries = []
  let filtered   = []
  let activeIdx  = 0

  // ── Filtering ────────────────────────────────────────────────────
  function applyFilter(q) {
    const query = q.trim().toLowerCase()
    filtered = query
      ? allEntries.filter(e => {
          const title    = (e.title || '').toLowerCase()
          const username = (e.fields?.username || '').toLowerCase()
          const url      = (e.fields?.url || '').toLowerCase()
          return title.includes(query) || username.includes(query) || url.includes(query)
        })
      : [...allEntries]
    activeIdx = 0
    renderList()
  }

  // ── Render ───────────────────────────────────────────────────────
  function esc(s) {
    const d = document.createElement('div')
    d.textContent = s
    return d.innerHTML
  }

  function renderList() {
    const wrap = document.getElementById('list-wrap')
    if (!wrap) return
    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="no-results">Keine Einträge gefunden.</div>'
      return
    }
    wrap.innerHTML = filtered.map((e, i) => {
      const active    = i === activeIdx
      const iconLabel = (e.title || '?')[0].toUpperCase()
      const sub       = e.fields?.username || e.username || e.fields?.url || e.url || '–'
      return `
        <div class="list-item${active ? ' active' : ''}" data-index="${i}">
          <div class="icon">${esc(iconLabel)}</div>
          <div class="info">
            <div class="title">${esc(e.title || 'Unbekannt')}</div>
            <div class="sub">${esc(sub)}</div>
          </div>
          <div class="enter-hint">↵</div>
        </div>`
    }).join('')

    // Aktiven Eintrag sichtbar scrollen
    requestAnimationFrame(() => {
      const el = wrap.querySelector('.list-item.active')
      if (el) el.scrollIntoView({ block: 'nearest' })
    })
  }

  function render(entries) {
    allEntries = entries
    filtered   = [...entries]
    activeIdx  = 0

    app.innerHTML = `
      <div class="search-wrap">
        <input id="search" class="search-input" type="text"
               placeholder="Filtern…" autocomplete="off" spellcheck="false" />
      </div>
      <div class="header">Passwort wählen (${entries.length})</div>
      <div class="list-wrap" id="list-wrap"></div>
      <div class="footer">
        <span><kbd>↑↓</kbd> Navigieren</span>
        <span><kbd>↵</kbd> Auswählen</span>
        <span><kbd>Esc</kbd> Abbrechen</span>
      </div>`

    renderList()

    const search = document.getElementById('search')
    search.focus()
    search.addEventListener('input', e => applyFilter(e.target.value))
  }

  // ── Navigation ───────────────────────────────────────────────────
  function move(dir) {
    if (!filtered.length) return
    activeIdx = (activeIdx + dir + filtered.length) % filtered.length
    renderList()
  }

  // ── Actions ──────────────────────────────────────────────────────
  function confirmSelection() {
    const selected = filtered[activeIdx]
    if (!selected?.id) return
    // Hauptfenster übernimmt das Schließen des Popups nach dem Event
    tauriEmit('autofill:select', { entryId: selected.id })
  }

  function cancel() {
    tauriEmit('autofill:cancel', {})
  }

  // ── Keyboard ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    switch (e.key) {
      case 'ArrowDown': e.preventDefault(); move(+1); break
      case 'ArrowUp':   e.preventDefault(); move(-1); break
      case 'Enter':     e.preventDefault(); confirmSelection(); break
      case 'Escape':    e.preventDefault(); cancel(); break
    }
  })

  // ── Click ────────────────────────────────────────────────────────
  document.addEventListener('click', e => {
    const item = e.target.closest('.list-item')
    if (!item) return
    const idx = parseInt(item.dataset.index, 10)
    if (isNaN(idx)) return
    activeIdx = idx
    confirmSelection()
  })

  // ── Auf Einträge vom Hauptfenster warten ─────────────────────────
  tauriListen('autofill:entries', event => {
    const entries = event.payload?.entries || event?.entries || []
    render(entries)
  })

  // Signal: Popup ist bereit, Hauptfenster kann Einträge senden
  tauriEmit('autofill:popup-ready', {})

  // ── Dev-Fallback (ohne Tauri) ────────────────────────────────────
  if (!window.__TAURI__ && !window.__TAURI_INTERNALS__) {
    setTimeout(() => {
      render([
        { id: 'demo-1', title: 'GitLab',  fields: { username: 'user@example.com', url: 'gitlab.com' } },
        { id: 'demo-2', title: 'GitHub',  fields: { username: 'user@example.com', url: 'github.com' } },
        { id: 'demo-3', title: 'Google',  fields: { username: 'user@gmail.com',   url: 'google.com' } },
      ])
    }, 300)
  }
})()
</script>
</body>
</html>
