version: "3.9"

# Grimlocker Enterprise Stack
# ─────────────────────────────────────────────────────────────────
# Services:
#   keycloak    – OIDC identity provider (dev mode, no TLS)
#   minio       – S3-compatible object store (vault backend)
#   grimlocker  – Enterprise daemon (mTLS on :9443)
#
# Quick start:
#   1. Place TLS certs in ./deploy/tls/ (server.crt, server.key, ca.crt)
#   2. docker-compose -f docker-compose.enterprise.yml up -d
#   3. Wait for "DAEMON READY" in grimlocker logs
#   4. export GRIMLOCKER_DAEMON_ADDR=localhost:9443
#      export OIDC_TOKEN=$(scripts/get-token.sh)
#      ./grimlocker unlock $OIDC_TOKEN
# ─────────────────────────────────────────────────────────────────

networks:
  grimlocker-net:
    driver: bridge

volumes:
  minio-data:
  keycloak-data:

services:

  # ── Keycloak OIDC Provider ─────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: grimlocker-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./deploy/keycloak:/opt/keycloak/data/import:ro
    networks:
      - grimlocker-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ── MinIO S3-Compatible Object Store ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: grimlocker-minio
    command: server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Admin console
    volumes:
      - minio-data:/minio_data
    networks:
      - grimlocker-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── MinIO bucket init (one-shot) ──────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: grimlocker-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb --ignore-existing local/grimlocker-vault &&
        mc policy set private local/grimlocker-vault &&
        echo 'Bucket ready.'
      "
    networks:
      - grimlocker-net

  # ── Grimlocker Enterprise Daemon ──────────────────────────────
  grimlocker:
    build:
      context: .
      dockerfile: Dockerfile.enterprise
      args:
        BUILD_DATE: "${BUILD_DATE:-latest}"
    container_name: grimlocker-daemon
    depends_on:
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      GRIMLOCKER_TIER: enterprise

      # OIDC (points to Keycloak inside the Docker network)
      GRIMLOCKER_OIDC_PROVIDER: http://keycloak:8080/realms/grimlocker
      GRIMLOCKER_OIDC_CLIENT_ID: grimlocker-daemon
      GRIMLOCKER_OIDC_CLIENT_SECRET: "${GRIMLOCKER_OIDC_CLIENT_SECRET:-changeme}"

      # S3 (MinIO)
      GRIMLOCKER_VAULT_BACKEND: minio
      GRIMLOCKER_S3_BUCKET: grimlocker-vault
      GRIMLOCKER_S3_REGION: us-east-1
      GRIMLOCKER_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123

      # mTLS certificates (mounted from host)
      GRIMLOCKER_MTLS_CERT_PATH: /etc/grimlocker/tls/server.crt
      GRIMLOCKER_MTLS_KEY_PATH: /etc/grimlocker/tls/server.key
      GRIMLOCKER_MTLS_CA_PATH: /etc/grimlocker/tls/ca.crt

      # Bind address for the mTLS listener (default: 0.0.0.0:9443).
      # Set to 127.0.0.1:9443 to restrict to localhost only.
      GRIMLOCKER_BIND_ADDR: "${GRIMLOCKER_BIND_ADDR:-0.0.0.0:9443}"

      # Entropy / data directory inside container
      GRIMLOCKER_APP_DIR: /var/lib/grimlocker

    ports:
      - "${GRIMLOCKER_BIND_ADDR:-0.0.0.0}:9443:9443"   # mTLS client connections
      # Port 9090 is NOT exposed to the host. The Docker HEALTHCHECK runs
      # inside the container and calls 127.0.0.1:9090 directly — no external
      # access needed. Exposing it would leak /health data on all interfaces.
    volumes:
      - ./deploy/tls:/etc/grimlocker/tls:ro  # Mount TLS certs (./scripts/gen-certs.sh)
    networks:
      - grimlocker-net
    restart: unless-stopped
    healthcheck:
      test: ["/usr/local/bin/grimlocker-healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
